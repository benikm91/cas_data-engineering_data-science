name: GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm clean-install

      - name: Build
        run: npm run build-github-pages

      # --- Add the ls -R debugging step RIGHT HERE ---
      - name: Verify Build Output
        run: |
          echo "Attempting to list contents of ./dist/cas-ml-slides/"
          # This command lists the contents of the expected output directory
          # Adjust the path './dist/cas-ml-slides/' if your Angular project name is different
          # or if you suspect the output goes elsewhere.
          ls -R ./dist/cas-ml-slides/ || echo "Directory ./dist/cas-ml-slides/ not found or is empty."
          # You might also want to list the parent 'dist' directory for context:
          # echo "Listing contents of ./dist/"
          # ls -R ./dist/ || echo "Directory ./dist/ not found or is empty."
      # --- End of the debugging step ---

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/cas-ml-slides'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
